<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lo-Fi Live Mixer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="mixer-board">
        <h1>Lo-Fi Mixer Board</h1>
        
        <div class="controls">
            <input type="file" id="audio-upload" accept="audio/*">
            <audio id="audio-player" loop></audio>
            
            <div class="buttons">
                <button id="play-btn">Play Track</button>
                <button id="pause-btn">Pause</button>
            </div>
        </div>
        
        <canvas id="visualizer"></canvas>

        <div class="sliders">
            <div class="slider-group">
                <label>Speed (Upbeat vibe)</label>
                <input type="range" id="speed-slider" min="0.5" max="1.5" step="0.05" value="1">
            </div>
            <div class="slider-group">
                <label>Soft Filter (Muffle the highs)</label>
                <input type="range" id="filter-slider" min="500" max="20000" step="100" value="20000">
            </div>
            <div class="slider-group">
                <label>Fantasy Reverb (Echo intensity)</label>
                <input type="range" id="reverb-slider" min="0" max="0.8" step="0.05" value="0">
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
