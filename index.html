<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lo-Fi Audio Processor</title>
    <style>
        body {
            background-color: #ffffff;
            color: #ff66b2; /* Bright Pink */
            font-family: 'Verdana', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #fff0f5; /* Lavender Blush (very light pink) */
            border: 2px solid #ff66b2;
            padding: 40px;
            width: 450px;
            text-align: center;
            border-radius: 10px;
        }
        h1 {
            letter-spacing: 1px;
            margin-bottom: 30px;
        }
        .input-group {
            margin: 20px 0;
            text-align: left;
        }
        label {
            font-weight: bold;
            display: block;
            margin-bottom: 8px;
        }
        input[type="file"], input[type="text"] {
            width: 90%;
            background: #ffffff;
            color: #ff66b2;
            border: 1px solid #ff66b2;
            padding: 10px;
            border-radius: 5px;
        }
        button {
            background-color: #ff66b2;
            color: #ffffff;
            border: none;
            padding: 15px 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            width: 100%;
            margin-top: 15px;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #ff3399;
        }
        button:disabled {
            background-color: #ffb3d9;
            cursor: not-allowed;
        }
        #status {
            margin-top: 20px;
            font-size: 14px;
            font-weight: bold;
        }
        #download-link {
            display: block;
            margin-top: 20px;
            color: #ff66b2;
            font-weight: bold;
            text-decoration: none;
            border: 1px dashed #ff66b2;
            padding: 10px;
            border-radius: 5px;
        }
        #download-link:hover {
            background-color: #ffe6f2;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Audio Processor</h1>
    
    <div class="input-group">
        <label>1. Upload Track</label>
        <input type="file" id="audio-upload" accept="audio/*">
    </div>

    <div class="input-group">
        <label>2. Keywords (soft, upbeat, fantasy, glitch)</label>
        <input type="text" id="keywords" placeholder="Enter words here...">
    </div>

    <button id="process-btn">Process & Download</button>

    <div id="status">Ready.</div>
    <a id="download-link" style="display: none;">Download New Track</a>
</div>

<script>
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const uploadInput = document.getElementById('audio-upload');
    const keywordsInput = document.getElementById('keywords');
    const processBtn = document.getElementById('process-btn');
    const statusText = document.getElementById('status');
    const downloadLink = document.getElementById('download-link');

    processBtn.addEventListener('click', async () => {
        const file = uploadInput.files[0];
        const keywords = keywordsInput.value.toLowerCase();

        if (!file) {
            statusText.innerText = "Please upload an audio file first.";
            return;
        }

        processBtn.disabled = true;
        statusText.innerText = "Reading file...";
        downloadLink.style.display = 'none';

        try {
            // Standard audio context just to decode the file
            const tempCtx = new AudioContext();
            const arrayBuffer = await file.arrayBuffer();
            const originalBuffer = await tempCtx.decodeAudioData(arrayBuffer);

            statusText.innerText = "Applying effects and rendering...";

            // Determine new duration based on speed
            let playbackRate = 1.0;
            if (keywords.includes('upbeat')) {
                playbackRate = 1.2; // 20% faster
            }
            const newDuration = originalBuffer.duration / playbackRate;

            // Create an OFFLINE context to render the file as fast as possible without playing it out loud
            const offlineCtx = new window.OfflineAudioContext(
                originalBuffer.numberOfChannels,
                offlineCtxLength = originalBuffer.sampleRate * newDuration,
                originalBuffer.sampleRate
            );

            const source = offlineCtx.createBufferSource();
            source.buffer = originalBuffer;
            source.playbackRate.value = playbackRate;

            let lastNode = source;

            // --- EFFECT: SOFT (Muffles high ends heavily) ---
            if (keywords.includes('soft')) {
                const filter = offlineCtx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 600; // Very muffled
                lastNode.connect(filter);
                lastNode = filter;
            }

            // --- EFFECT: FANTASY (Dreamy Delay/Echo) ---
            if (keywords.includes('fantasy')) {
                const delay = offlineCtx.createDelay();
                delay.delayTime.value = 0.5; // Half second echo

                const feedback = offlineCtx.createGain();
                feedback.gain.value = 0.4; // Echo repeats

                const dryWetMerge = offlineCtx.createGain();

                lastNode.connect(delay);
                delay.connect(feedback);
                feedback.connect(delay); // Loop back for multiple echoes
                
                // Connect original signal and echo signal together
                lastNode.connect(dryWetMerge);
                delay.connect(dryWetMerge);
                
                lastNode = dryWetMerge;
            }

            // --- EFFECT: GLITCH (Breaks things apart rhythmically) ---
            if (keywords.includes('glitch')) {
                const stutterGain = offlineCtx.createGain();
                const oscillator = offlineCtx.createOscillator();
                
                // Creates a harsh square wave that turns volume on and off rapidly
                oscillator.type = 'square';
                oscillator.frequency.value = 8; // Chops 8 times a second
                
                oscillator.connect(stutterGain.gain);
                oscillator.start();

                lastNode.connect(stutterGain);
                lastNode = stutterGain;
            }

            // Connect final chain to the offline destination
            lastNode.connect(offlineCtx.destination);
            source.start(0);

            // Render the audio!
            const renderedBuffer = await offlineCtx.startRendering();

            statusText.innerText = "Packaging into .wav file...";

            // Convert the AudioBuffer to a WAV file Blob
            const wavBlob = audioBufferToWav(renderedBuffer);
            const url = URL.createObjectURL(wavBlob);

            downloadLink.href = url;
            downloadLink.download = "processed-vibe.wav";
            downloadLink.style.display = 'block';
            statusText.innerText = "Done! Ready to download.";

        } catch (error) {
            console.error(error);
            statusText.innerText = "An error occurred during processing.";
        } finally {
            processBtn.disabled = false;
        }
    });

    // Helper function to convert AudioBuffer to WAV format
    function audioBufferToWav(buffer) {
        const numOfChan = buffer.numberOfChannels;
        const length = buffer.length * numOfChan * 2 + 44;
        const outBuffer = new ArrayBuffer(length);
        const view = new DataView(outBuffer);
        const channels = [];
        let i, sample, offset = 0, pos = 0;

        function setUint16(data) { view.setUint16(pos, data, true); pos += 2; }
        function setUint32(data) { view.setUint32(pos, data, true); pos += 4; }

        setUint32(0x46464952); // "RIFF"
        setUint32(length - 8); // file length - 8
        setUint32(0x45564157); // "WAVE"
        setUint32(0x20746d66); // "fmt " chunk
        setUint32(16); // length = 16
        setUint16(1); // PCM (uncompressed)
        setUint16(numOfChan);
        setUint32(buffer.sampleRate);
        setUint32(buffer.sampleRate * 2 * numOfChan); // avg. bytes/sec
        setUint16(numOfChan * 2); // block-align
        setUint16(16); // 16-bit
        setUint32(0x61746164); // "data" - chunk
        setUint32(length - pos - 4); // chunk length

        for(i = 0; i < buffer.numberOfChannels; i++) {
            channels.push(buffer.getChannelData(i));
        }

        while(pos < length) {
            for(i = 0; i < numOfChan; i++) {
                sample = Math.max(-1, Math.min(1, channels[i][offset])); // clamp
                sample = (0.5 + sample < 0 ? sample * 32768 : sample * 32767)|0; // scale
                view.setInt16(pos, sample, true); // write 16-bit sample
                pos += 2;
            }
            offset++;
        }
        return new Blob([outBuffer], {type: "audio/wav"});
    }
</script>

</body>
</html>
